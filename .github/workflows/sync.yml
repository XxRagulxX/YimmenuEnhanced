name: Auto Cherry-Pick YimMenuV2

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

env:
  UPSTREAM_REPO: "https://github.com/YimMenu/YimMenuV2.git"
  UPSTREAM_BRANCH: "enhanced"
  BASE_BRANCH: "dev"
  ORIGIN_REPO: "${{ github.repository }}"

jobs:
  cherry-pick-new-commits:
    name: Auto Cherry-Pick
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: 🛠️ Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: 👤 Configure Git Identity
        run: |
          git config --global user.name "${{ secrets.GIT_USER_NAME }}"
          git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: 🔄 Sync Base Branch
        run: |
          git checkout ${{ env.BASE_BRANCH }}
          git pull origin ${{ env.BASE_BRANCH }}

      - name: 📍 Initialize Commit Tracker
        run: |
          if [ ! -f .last-cherry-picked ]; then
            echo "d0816571ead6f07cec08b9e89670458b9c650555" > .last-cherry-picked
            git add .last-cherry-picked
            if ! git diff --cached --quiet; then
              git commit -m "🔖 Initialize commit tracker"
              git push origin ${{ env.BASE_BRANCH }}
            fi
          fi

      - name: 🔍 Get Last Processed Commit
        id: last_commit
        run: |
          LAST_COMMIT=$(cat .last-cherry-picked)
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT
          echo "ℹ️ Last processed commit: $LAST_COMMIT"

      - name: 🔄 Fetch Upstream Changes
        run: |
          git remote add upstream ${{ env.UPSTREAM_REPO }} || true
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --force

      - name: 🔎 Find New Commits
        id: new_commits
        run: |
          last_commit="${{ steps.last_commit.outputs.last_commit }}"
          NEW_COMMITS=$(git rev-list $last_commit..upstream/${{ env.UPSTREAM_BRANCH }} --reverse --no-merges)
          if [ -z "$NEW_COMMITS" ]; then
            echo "ℹ️ No new commits found"
            exit 0
          fi
          echo "ℹ️ Found commits:"
          git --no-pager show -s --format="%h %s" $NEW_COMMITS || true
          DELIM_COMMIT_LIST=$(echo "$NEW_COMMITS" | paste -sd "," -)
          echo "commits=$DELIM_COMMIT_LIST" >> $GITHUB_OUTPUT

      - name: 🍒 Create PR for each new commit
        if: steps.new_commits.outputs.commits != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -e
          IFS=',' read -ra COMMITS <<< "${{ steps.new_commits.outputs.commits }}"
          for commit in "${COMMITS[@]}"; do
            branch_name="cherry-pick/${commit:0:8}"
            echo "🚀 Processing commit: $commit"
            git checkout ${{ env.BASE_BRANCH }}
            git pull origin ${{ env.BASE_BRANCH }}
            # Delete the remote branch if it exists to avoid non-fast-forward errors
            git push origin --delete "$branch_name" || true
            git checkout -b "$branch_name"
            # Try cherry-pick, but if it fails, stop and keep the conflicted state
            if git cherry-pick -x "$commit"; then
              echo "✅ Cherry-pick succeeded for $commit"
            else
              echo "⚠️ Cherry-pick failed for $commit (conflict likely). Pushing branch for manual resolution."
              git add .
              if ! git diff --cached --quiet; then
                git commit -m "🚧 WIP: Conflict during cherry-pick of $commit" || true
              fi
            fi
            echo "$commit" > .last-cherry-picked
            git add .last-cherry-picked
            if ! git diff --cached --quiet; then
              git commit --amend --no-edit || true
            fi
            git push -u origin "$branch_name"
            # Get the original commit message for the PR title
            commit_msg=$(git log -1 --pretty=%s $commit)
            gh pr create \
              --repo ${{ env.ORIGIN_REPO }} \
              --title "$commit_msg" \
              --body "Automated cherry-pick from YimMenuV2

            **Source Commit:** $commit

            _If there are conflicts, please resolve them manually in this PR._" \
              --base ${{ env.BASE_BRANCH }} \
              --head "$branch_name"
            git checkout ${{ env.BASE_BRANCH }}
            git branch -D "$branch_name"
          done

      - name: 🔄 Update Commit Tracker
        if: steps.new_commits.outputs.commits != ''
        run: |
          git checkout ${{ env.BASE_BRANCH }}
          git pull origin ${{ env.BASE_BRANCH }}
          git add .last-cherry-picked
          if ! git diff --cached --quiet; then
            git commit -m "🔖 Update last cherry-picked commit"
            git push origin ${{ env.BASE_BRANCH }}
          fi