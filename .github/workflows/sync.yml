name: Auto Cherry-Pick YimMenuV2

on:
  schedule:
    - cron: '0 * * * *' # Every hour
  workflow_dispatch:

jobs:
  cherry-pick-new-commits:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up GPG for commit signing
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.GPG_PASSPHRASE }}
          git_user_signingkey: true
          git_commit_gpgsign: true

      - name: Configure Git user
        run: |
          git config --global user.name "${{ secrets.GIT_USER_NAME }}"
          git config --global user.email "${{ secrets.GIT_USER_EMAIL }}"

      - name: Ensure .last-cherry-picked exists
        run: |
          if [ ! -f .last-cherry-picked ]; then
            echo "0000000000000000000000000000000000000000" > .last-cherry-picked
            git add .last-cherry-picked
            git commit -m "Initialize .last-cherry-picked"
            git push
          fi

      - name: Get last cherry-picked commit
        id: last
        run: |
          LAST_COMMIT=$(cat .last-cherry-picked)
          echo "last_commit=$LAST_COMMIT" >> $GITHUB_OUTPUT

      - name: Fetch upstream commits
        run: |
          git remote add upstream https://github.com/YimMenu/YimMenuV2.git || true
          git fetch upstream

      - name: Find new commits to cherry-pick
        id: newcommits
        run: |
          last_commit="${{ steps.last.outputs.last_commit }}"
          NEW_COMMITS=$(git rev-list upstream/enhanced ^$last_commit --reverse)
          echo "commits=$NEW_COMMITS" >> $GITHUB_OUTPUT

      - name: Cherry-pick and create PR for each new commit
        if: steps.newcommits.outputs.commits != ''
        env:
          GH_TOKEN: ${{ secrets.PAT }}
        run: |
          set -e
          for commit in ${{ steps.newcommits.outputs.commits }}
          do
            branch="cherry-pick-${commit:0:8}"
            git checkout -b $branch
            git cherry-pick -x -S $commit
            # Update the .last-cherry-picked file
            echo "$commit" > .last-cherry-picked
            git add .last-cherry-picked
            git commit --amend --no-edit -S
            git push origin $branch
            gh pr create \
              --title "Cherry-pick $commit from YimMenuV2" \
              --body "Automated cherry-pick of $commit from YimMenuV2. Please review." \
              --base main \
              --head $branch
            git checkout main
            git branch -D $branch
          done

      - name: Push updated .last-cherry-picked to main
        if: steps.newcommits.outputs.commits != ''
        run: |
          git add .last-cherry-picked
          git commit -m "Update last cherry-picked commit"
          git push