name: Nightly Build

on:
  schedule:
    - cron: "0 14 * * *"  # Every day at 2PM UTC
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  build_nightly:
    runs-on: windows-latest
    name: Build Nightly
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 🛠️ Check CMake version
        run: cmake --version

      - name: 🏗️ Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: ⚙️ Generate CMake project
        run: cmake -DCMAKE_C_COMPILER=clang -DCMAKE_CXX_COMPILER=clang++ -DCMAKE_BUILD_TYPE=RelWithDebInfo -S . -B build -G Ninja

      - name: 🧩 Build DLL
        run: cmake --build ./build --config RelWithDebInfo --target YimMenuV2 --

      - name: 📦 Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary
          path: |
            build/YimMenuV2.dll
            build/YimMenuV2.pdb

      - name: 📝 Generate Build Info
        id: buildinfo
        run: |
          echo "full_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT
          echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

  recreate_release:
    runs-on: ubuntu-latest
    name: Recreate Release
    needs: build_nightly
    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Existing Release & Tag
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = "nightly";
            const releases = await github.rest.repos.listReleases({ owner, repo });
            const release = releases.data.find(r => r.tag_name === tag);
            if (release) {
              await github.rest.repos.deleteRelease({ owner, repo, release_id: release.id });
              console.log(`Deleted release with ID ${release.id}`);
            }
            try {
              await github.rest.git.deleteRef({ owner, repo, ref: `tags/${tag}` });
              console.log(`Deleted tag ${tag}`);
            } catch (error) {
              console.log(`Tag ${tag} did not exist or could not be deleted.`);
            }

      - name: 📥 Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: binary

      - name: 🔑 Generate SHA256
        id: build_sha
        run: |
          sha256sum YimMenuV2.dll > sha256.checksum
          echo "build_sha=$(cut -d ' ' -f 1 sha256.checksum)" >> $GITHUB_OUTPUT

      - name: 🚀 Nightly Release
        uses: softprops/action-gh-release@v2.2.2
        with:
          name: "Nightly [${{ needs.build_nightly.outputs.short_sha }}]"
          tag_name: nightly
          body: |
            ## 🌙 Nightly Build

            - [Workflow Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            - **SHA256:** `${{ steps.build_sha.outputs.build_sha }}`
            - **Commit:** `${{ needs.build_nightly.outputs.full_sha }}`

            > This is an automated nightly build.  
            > Artifacts are for testing and development only.

          files: |
            YimMenuV2.dll